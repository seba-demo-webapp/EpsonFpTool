name: Build app

# Builda Mac (.dmg) e Windows (.exe) ad ogni push sul branch principale,
# ad ogni tag "v*" e manualmente dalla tab Actions di GitHub.
on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Tool EpsonFp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS)
        if: matrix.name == 'mac'
        run: npm run dist

      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cassa-rt-epson-${{ matrix.name }}
          path: |
            Tool EpsonFp/release/*.dmg
            Tool EpsonFp/release/*.exe
          if-no-files-found: ignore

  # Se hai pushato un tag "v1.2.3", crea automaticamente una Release
  # con allegati .dmg e .exe.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
